<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEO Dungeon</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#141414">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SEO Dungeon">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060608;
      color: #c0c0d0;
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── Left: Game / Title Area ──────────────── */
    #game-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      position: relative;
      background: #07070a;
    }

    #game-container {
      display: none;
    }

    /* ── Title Screen (pure HTML) ─────────────── */
    #title-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 40px 20px;
      gap: 0;
    }

    #title-screen h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(24px, 4vw, 40px);
      color: #d4af37;
      margin-bottom: 32px;
      text-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
    }

    #title-screen .subtitle {
      display: none;
    }

    /* ── Character Select Row ──────────────── */
    #char-select {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      margin-bottom: 12px;
    }

    .char-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: 260px;
      height: 320px;
      padding: 0 0 10px;
      overflow: hidden;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.25s;
    }

    .char-option:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .char-option.selected {
      border-color: #d4af37;
      background: rgba(212, 175, 55, 0.06);
    }

    .char-option canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform: translateY(12px) scale(2);
      transform-origin: center center;
    }

    .char-option span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: #606078;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
      transform: translateY(-15px);
      transition: color 0.2s;
    }

    .char-option.selected span {
      color: #d4af37;
    }

    @keyframes charFlash {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .char-model {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: -12px;
      transform: translateY(-15px);
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .char-option.selected .char-model { opacity: 0.85; }
    .char-model.gold { color: #d4af37; }
    .char-model.blue { color: #88bbff; }
    .char-model.green { color: #66ddaa; }

    #title-screen .tagline {
      font-size: 15px;
      color: #a0a0b8;
      font-weight: 400;
      margin-bottom: 36px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 400px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: #9090a8;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .form-group input {
      width: 100%;
      padding: 12px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      color: #d4af37;
      background: #10102a;
      border: 1px solid #252540;
      border-radius: 6px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
    }

    .form-group input.path-input {
      font-size: 13px;
      color: #5cb8c8;
    }

    .form-group input.path-input:focus {
      border-color: #5cb8c8;
      box-shadow: 0 0 0 2px rgba(92, 184, 200, 0.1);
    }

    #descend-btn {
      margin-top: 12px;
      padding: 14px 44px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: #08081a;
      background: linear-gradient(180deg, #e0c050, #c49a30);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 3px;
      transition: transform 0.1s, box-shadow 0.2s, opacity 0.3s;
      box-shadow: 0 2px 12px rgba(212, 175, 55, 0.2);
    }

    #descend-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
    }

    #descend-btn:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 0 1px 6px rgba(212, 175, 55, 0.15);
    }

    #descend-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Validation styles ──────────────── */
    .form-group input.valid {
      border-color: #3a7a3a;
    }

    .form-group input.invalid {
      border-color: #cc4444;
    }

    #validation-errors {
      margin-top: 8px;
      font-size: 12px;
      color: #cc4444;
      text-align: center;
      min-height: 18px;
    }

    .safety-note {
      margin-top: 28px;
      font-size: 13px;
      color: #707088;
      text-align: center;
      line-height: 1.7;
    }

    #bridge-status {
      margin-top: 16px;
      font-size: 13px;
      color: #8080a0;
      transition: color 0.3s;
    }

    #bridge-status.connected { color: #60c060; }
    #bridge-status.error { color: #d06060; }

    /* ── SFX Volume Control ──────────────────── */
    #sfx-control {
      position: absolute;
      bottom: 14px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 200;
      background: rgba(10, 10, 30, 0.7);
      border: 1px solid #2a2a4e;
      border-radius: 6px;
      padding: 4px 10px;
    }

    #sfx-toggle {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
      filter: grayscale(0);
      transition: filter 0.2s;
    }
    #sfx-toggle.muted {
      filter: grayscale(1) opacity(0.4);
    }

    #sfx-volume {
      width: 70px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #2a2a4e;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #sfx-volume::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #d4af37;
      cursor: pointer;
    }
    #sfx-volume::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #d4af37;
      border: none;
      cursor: pointer;
    }

    /* ── Right: Activity Log (Guild Ledger) ─────────────────
       The panel itself acts as a framed parchment scroll: subtle
       vertical gradient to fake candle-lit depth, a thin gold
       border-left as a seam, and a header treated like an embossed
       brass plate. The interior scrolls through the live ledger. */
    #log-panel {
      width: 33.33%;
      min-width: 300px;
      max-width: 600px;
      background:
        radial-gradient(ellipse 140% 80% at 50% 0%,
                        rgba(212, 175, 55, 0.035) 0%,
                        transparent 55%),
        linear-gradient(180deg, #0a0a0e 0%, #050507 65%, #030305 100%);
      border-left: 1px solid rgba(212, 175, 55, 0.18);
      box-shadow: inset 1px 0 0 rgba(212, 175, 55, 0.06),
                  inset 0 0 60px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Top and bottom vignette for depth - pseudo-elements so they
       don't interfere with scroll. Very subtle. */
    #log-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 40px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.45), transparent);
      pointer-events: none;
      z-index: 2;
    }
    #log-panel::after {
      content: '';
      position: absolute;
      bottom: 54px; left: 0; right: 0;
      height: 30px;
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.45), transparent);
      pointer-events: none;
      z-index: 2;
    }

    /* Header - "GUILD LEDGER" brass plate feel. Static gold with
       subtle embossed shadow. A thin gold hairline above and below
       frames the title like a plate rivet. */
    #log-header {
      padding: 14px 20px 12px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.22);
      background: linear-gradient(180deg,
                  rgba(212, 175, 55, 0.04) 0%,
                  rgba(212, 175, 55, 0.015) 100%);
      flex-shrink: 0;
      position: relative;
    }
    /* Hairline gold accent below the header */
    #log-header::after {
      content: '';
      position: absolute;
      left: 12%;
      right: 12%;
      bottom: -1px;
      height: 1px;
      background: linear-gradient(90deg,
                  transparent,
                  rgba(212, 175, 55, 0.55) 50%,
                  transparent);
    }

    #log-header h2 {
      font-size: 12px;
      font-weight: 600;
      color: #d4af37;
      letter-spacing: 7px;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.7),
                   0 0 10px rgba(212, 175, 55, 0.2);
      margin: 0;
    }

    /* Scroll body - where the ledger lines live. A faint horizontal
       rule at the top creates the feeling of text continuing behind
       the header. Subtle top/bottom shadow inset gives depth. */
    #log-content {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px 24px;
      font-size: 13px;
      line-height: 1.75;
      letter-spacing: 0.015em;
      scrollbar-width: thin;
      scrollbar-color: rgba(212, 175, 55, 0.35) rgba(10, 10, 14, 0.4);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
      z-index: 1;
    }

    /* Scrollbar: gold tinge to match the ledger palette */
    #log-content::-webkit-scrollbar { width: 5px; }
    #log-content::-webkit-scrollbar-track {
      background: rgba(10, 10, 14, 0.4);
      border-radius: 3px;
    }
    #log-content::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(212, 175, 55, 0.45), rgba(164, 134, 40, 0.35));
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, 0.3);
    }
    #log-content::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(240, 204, 80, 0.6), rgba(184, 146, 48, 0.5));
    }

    .log-line {
      padding: 3px 0;
      overflow-wrap: break-word;
      word-wrap: break-word;
      hyphens: auto;
    }
    /* Colors and effects injected by activity-log.js */

    /* ── Ledger Input Bar ───────────────── */
    #log-input-bar {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid #1a1710;
      background: #060608;
      flex-shrink: 0;
    }

    #log-input-prompt {
      padding-top: 2px;
    }

    #log-input-prompt {
      color: #d4af37;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: bold;
      flex-shrink: 0;
    }

    #log-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #c0c0d0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      caret-color: #d4af37;
      resize: none;
      overflow-y: hidden;
      line-height: 1.5;
      max-height: 120px;
      scrollbar-width: none;
    }

    #log-input::-webkit-scrollbar { width: 0; }

    #log-input::placeholder {
      color: #353548;
    }

    #log-input:focus::placeholder {
      color: #454560;
    }

    #log-cancel {
      background: none;
      border: 1px solid #2a2a40;
      border-radius: 3px;
      color: #505068;
      font-size: 10px;
      cursor: pointer;
      padding: 2px 6px;
      font-family: 'JetBrains Mono', monospace;
      transition: color 0.15s, border-color 0.15s;
      display: none;
    }

    #log-cancel:hover {
      color: #cc4444;
      border-color: #cc4444;
    }

    #log-input-bar.running #log-cancel {
      display: block;
    }

    #log-input-bar.running #log-input-prompt {
      color: #60c060;
      animation: promptPulse 1.5s ease-in-out infinite;
    }

    @keyframes promptPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @media (max-width: 900px) {
      #log-panel { width: 30%; min-width: 220px; }
    }
  </style>
</head>
<body>

  <div id="game-area">
    <!-- Title screen (HTML) - hidden when game starts -->
    <div id="title-screen">
      <h1>SEO DUNGEON</h1>

      <div id="char-select">
        <div class="char-option selected" data-char="warrior">
          <canvas id="char-warrior"></canvas>
          <span>WARRIOR</span>
          <span class="char-model gold">OPUS</span>
        </div>
        <div class="char-option" data-char="samurai">
          <canvas id="char-samurai"></canvas>
          <span>SAMURAI</span>
          <span class="char-model blue">SONNET</span>
        </div>
        <div class="char-option" data-char="knight">
          <canvas id="char-knight"></canvas>
          <span>KNIGHT</span>
          <span class="char-model green">HAIKU</span>
        </div>
      </div>

      <div class="tagline">Slay your SEO demons...</div>

      <div class="form-group">
        <label>Domain</label>
        <input type="text" id="domain-input" value="seodungeon.com" placeholder="example.com" autocomplete="off" spellcheck="false">
      </div>

      <div class="form-group">
        <label>Project Folder</label>
        <input type="text" id="path-input" class="path-input" value="D:\seodungeon" placeholder="/path/to/your/project" autocomplete="off" spellcheck="false">
      </div>

      <button id="descend-btn" disabled>SEAL YOUR FATE</button>
      <div id="validation-errors"></div>

      <div id="bridge-status">Entering the dungeon...</div>
    </div>

    <!-- Phaser game canvas (hidden until game starts) -->
    <div id="game-container"></div>

    <!-- Volume control -->
    <div id="sfx-control">
      <button id="sfx-toggle" title="Toggle sound effects">&#x1F50A;</button>
      <input id="sfx-volume" type="range" min="0" max="100" value="35" title="Volume">
    </div>
  </div>

  <div id="log-panel">
    <div id="log-header">
      <h2>Guild Ledger</h2>
    </div>
    <div id="log-content">
      <div class="log-line system">System ready</div>
    </div>
    <div id="log-input-bar">
      <span id="log-input-prompt">&gt;</span>
      <textarea id="log-input" placeholder="Talk to the agent..." autocomplete="off" spellcheck="false" rows="1"></textarea>
      <button id="log-cancel" title="Cancel (Esc x2)">&#x25A0;</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
